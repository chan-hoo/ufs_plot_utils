input:
  geo_file:
    path: /work2/noaa/epic/chjeon/ufsda_hercules/ufs-da-workflow/fix/DATA_fix/FV3/Tiled/C96
    filename: C96.mx100_oro_data
    type: orog

  data_file:
    path: /work2/noaa/epic/chjeon/ufsda_hercules/ufs-da-workflow/fix/DATA_ref/atm
    filename: ufsda.t00z.atminc.cubed_sphere_grid
    type: tile
    var_list:
      - T_inc
      - u_inc
      - v_inc
    z_index: 76

output:
  path: ./
  filename_prefix: atminc_fv3

plot:
  cartopy_ne_path: /work2/noaa/epic/chjeon/ufsda_hercules/ufs-da-workflow/fix/NaturalEarth
  increment: true
  cycle: t00z
  PDY: 20240224

  colormap:
    default: gist_ncar_r
    T_inc: RdBu_r
    u_inc: RdBu_r
    v_inc: RdBu_r

  range:
    default:
      vmin: null
      vmax: null
    T_inc:
      vmin: -2.5
      vmax: 2.5
    u_inc:
      vmin: -5
      vmax: 5
    v_inc:
      vmin: -5
      vmax: 5

  background:
    - coastline
    #- states
    #- borders
    #- lakes
    #- land

