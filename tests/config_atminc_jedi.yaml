input:
  datasets:
    - name: jedi
      data_kind: increment   # increment | analysis | forecast | etc.
      geo:
        path: /work2/noaa/epic/chjeon/ufsda_hercules/ufs-da-workflow/fix/DATA_ref/atm
        filename: cubed_sphere_grid_atminc.jedi.nc
        file_type: file
      dataset:
        path: /work2/noaa/epic/chjeon/ufsda_hercules/ufs-da-workflow/fix/DATA_ref/atm
        filename: cubed_sphere_grid_atminc.jedi.nc
        file_type: file
        var_list:
          - tmp
          - ugrd
          - vgrd
        z_index: 76
        time_index: 0   # optional (default = 0)
      colormap:
        default: gist_ncar_r
        tmp: RdBu_r
        ugrd: RdBu_r
        vgrd: RdBu_r
      range:
        default:
          vmin: null
          vmax: null
        tmp:
          vmin: -2.5
          vmax: 2.5
        ugrd:
          vmin: -5
          vmax: 5
        vgrd:
          vmin: -5
          vmax: 5

output:
  path: ./
  prefix: atminc

plot:
  cartopy_ne_path: /work2/noaa/epic/chjeon/ufsda_hercules/ufs-da-workflow/fix/NaturalEarth

  cycle: t00z
  PDY: 20240224

  projection:
    name: Robinson
    central_longitude: -77.0369
  figure:
    figsize: [10, 5]
    dpi: 150
  colorbar:
    size: "3%"
    pad: 0.1
    label_fontsize: 7
    tick_fontsize: 6
  title:
    fontsize: 8
  background:
    features:
      - coastline
      # - land
      # - lakes
      # - states
      # - borders
    resolution: 50m
    linewidth: 0.5
    alpha: 0.7

